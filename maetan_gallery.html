<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026학년도 매탄중 자유학기 미술창의조형 갤러리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

:root {
  --gold: #c9a96e;
  --gold-light: #e8d5a3;
  --gold-dim: rgba(201,169,110,0.15);
  --dark: #0a0a0f;
  --darker: #05050a;
  --wall-color: #1c1714;
  --wall-trim: #2a221d;
  --floor-a: #100e0c;
  --floor-b: #141210;
  --text: #f0e8d8;
  --text-muted: #7a6a58;
  --frame-dark: #6b4f10;
  --frame-mid: #9a7020;
  --frame-light: #c9a96e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--darker);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ═══════════════════════════════
   INTRO
═══════════════════════════════ */
#intro {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--darker);
  cursor: pointer;
  transition: opacity 1.4s ease;
}
#intro.fade-out { opacity:0; pointer-events:none; }

.intro-glow {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 45%, rgba(201,169,110,0.07) 0%, transparent 70%);
}
.intro-rings {
  position: absolute; inset:0;
  display: flex; align-items:center; justify-content:center;
  pointer-events: none;
}
.ring {
  position: absolute;
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 50%;
  animation: ringPulse 5s ease-in-out infinite;
}
.ring:nth-child(1) { width:700px; height:700px; animation-delay:0s; }
.ring:nth-child(2) { width:500px; height:500px; animation-delay:1s; }
.ring:nth-child(3) { width:300px; height:300px; animation-delay:2s; }
@keyframes ringPulse {
  0%,100% { transform:scale(1); opacity:0.4; }
  50% { transform:scale(1.04); opacity:0.9; }
}

.intro-corner { position:absolute; width:50px; height:50px; border-color:var(--gold); border-style:solid; opacity:0.25; }
.intro-corner.tl { top:28px; left:28px; border-width:1px 0 0 1px; }
.intro-corner.tr { top:28px; right:28px; border-width:1px 1px 0 0; }
.intro-corner.bl { bottom:28px; left:28px; border-width:0 0 1px 1px; }
.intro-corner.br { bottom:28px; right:28px; border-width:0 1px 1px 0; }

.intro-badge {
  font-size:11px; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase;
  margin-bottom:32px;
  animation: fadeUp 1.2s ease 0.1s both;
}
.intro-title {
  font-family:'Noto Serif KR',serif;
  font-size: clamp(20px,3.5vw,36px);
  font-weight:300; line-height:1.65; text-align:center; color:var(--text);
  margin-bottom:8px;
  animation: fadeUp 1.2s ease 0.35s both;
}
.intro-title em { font-style:normal; font-weight:600; color:var(--gold-light); }
.intro-sub {
  font-size:12px; color:var(--text-muted); letter-spacing:0.2em; margin-bottom:56px;
  animation: fadeUp 1.2s ease 0.55s both;
}
.intro-line {
  width:60px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:40px;
  animation: fadeUp 1.2s ease 0.65s both;
}
.intro-cta {
  font-size:12px; letter-spacing:0.35em; color:var(--gold); text-transform:uppercase;
  animation: fadeUp 1.2s ease 0.8s both, blinkAnim 2.5s ease-in-out 2s infinite;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes blinkAnim {
  0%,100% { opacity:1; } 50% { opacity:0.25; }
}

/* room selector cards on intro */
.lobby {
  position: absolute; bottom:0; left:0; right:0;
  display: flex; justify-content:center; gap:0;
  animation: fadeUp 1.2s ease 1.1s both;
  pointer-events: none;
}
.lobby-door {
  width: 120px;
  cursor: pointer;
  pointer-events: all;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px 28px;
  border-left: 1px solid rgba(201,169,110,0.1);
  transition: background 0.3s;
}
.lobby-door:last-child { border-right: 1px solid rgba(201,169,110,0.1); }
.lobby-door:hover { background: rgba(201,169,110,0.05); }
.door-arch {
  width:60px; height:80px;
  border: 1px solid rgba(201,169,110,0.25);
  border-bottom:none;
  border-radius: 30px 30px 0 0;
  display: flex; align-items:center; justify-content:center;
  margin-bottom:10px;
  position: relative;
  transition: border-color 0.3s;
}
.lobby-door:hover .door-arch { border-color: rgba(201,169,110,0.6); }
.door-num {
  font-family:'Noto Serif KR',serif;
  font-size:18px; color:rgba(201,169,110,0.4);
  transition: color 0.3s;
}
.lobby-door:hover .door-num { color:var(--gold); }
.door-label {
  font-size:10px; color:var(--text-muted); letter-spacing:0.1em; text-align:center;
  line-height:1.5;
}

/* ═══════════════════════════════
   GALLERY SCENE
═══════════════════════════════ */
#gallery {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
}
#gallery.active { display:flex; }

/* HUD top */
.hud {
  position: absolute; top:0; left:0; right:0; z-index:50;
  display: flex; align-items:center; justify-content:space-between;
  padding: 12px 24px;
  background: linear-gradient(to bottom, rgba(5,5,10,0.98) 60%, transparent);
  pointer-events: none;
}
.hud-left { display:flex; align-items:center; gap:16px; pointer-events:all; }
.hud-back {
  background: none; border: 1px solid rgba(201,169,110,0.3);
  color: var(--gold); font-size:11px; padding:6px 14px;
  border-radius:2px; cursor:pointer; letter-spacing:0.1em;
  transition: all 0.2s; font-family:'Noto Sans KR',sans-serif;
}
.hud-back:hover { background:rgba(201,169,110,0.1); }
.hud-room-name {
  font-family:'Noto Serif KR',serif;
  font-size:15px; color:var(--gold-light); letter-spacing:0.08em;
}
.hud-room-sub { font-size:11px; color:var(--text-muted); }
.hud-right { pointer-events:all; display:flex; gap:8px; }
.hud-room-btn {
  background:rgba(201,169,110,0.07);
  border:1px solid rgba(201,169,110,0.25);
  color:var(--text-muted); font-size:11px; padding:5px 14px;
  border-radius:2px; cursor:pointer; transition:all 0.2s;
  font-family:'Noto Sans KR',sans-serif; letter-spacing:0.05em;
}
.hud-room-btn:hover { color:var(--gold); border-color:rgba(201,169,110,0.5); }
.hud-room-btn.active { color:var(--gold-light); border-color:var(--gold); background:rgba(201,169,110,0.15); }

/* bottom HUD */
.hud-bottom {
  position: absolute; bottom:0; left:0; right:0; z-index:50;
  display: flex; align-items:flex-end; justify-content:space-between;
  padding: 0 24px 16px;
  background: linear-gradient(to top, rgba(5,5,10,0.95) 50%, transparent);
  pointer-events: none;
}
.nav-arrows { display:flex; gap:8px; pointer-events:all; }
.arr-btn {
  width:40px; height:40px;
  background:rgba(201,169,110,0.1); border:1px solid rgba(201,169,110,0.3);
  color:var(--gold); font-size:18px; border-radius:2px;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.arr-btn:hover { background:rgba(201,169,110,0.2); }
.progress-info { font-size:11px; color:var(--text-muted); letter-spacing:0.1em; text-align:right; }
.progress-bar-wrap { width:120px; height:2px; background:rgba(201,169,110,0.15); border-radius:1px; margin-top:5px; margin-left:auto; }
.progress-bar-fill { height:100%; background:var(--gold); border-radius:1px; transition:width 0.4s ease; }

/* hint */
.hint {
  position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
  font-size:11px; color:var(--text-muted); letter-spacing:0.2em;
  pointer-events:none; text-align:center; z-index:49;
  animation: fadeHint 4s ease 2s both;
}
@keyframes fadeHint {
  0% { opacity:0; } 20% { opacity:0.7; } 80% { opacity:0.7; } 100% { opacity:0; }
}

/* ═══════════════════════════════
   3D SCENE
═══════════════════════════════ */
.viewport {
  flex:1; position:relative; overflow:hidden;
}

/* The camera/world container */
.world {
  position:absolute; inset:0;
  perspective: 1000px;
  perspective-origin: 50% 42%;
}

.scene3d {
  position:absolute; inset:0;
  transform-style: preserve-3d;
}

/* WALLS */
.g-wall {
  position:absolute;
  backface-visibility: hidden;
  transform-style: preserve-3d;
}

/* The main gallery corridor */
.gallery-room {
  position:absolute; inset:0;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
}

/* Floor plane */
.g-floor {
  position:absolute;
  left:-2000px; right:-2000px;
  bottom: 0;
  height:50vh;
  transform-origin: bottom center;
  transform: rotateX(75deg) translateY(100%);
  background:
    repeating-linear-gradient(90deg,
      #0e0c0a 0,#0e0c0a 99px,
      #111009 100px,#111009 200px),
    repeating-linear-gradient(0deg,
      transparent 0,transparent 99px,
      rgba(201,169,110,0.04) 100px,rgba(201,169,110,0.04) 101px);
  background-size:100px 100px;
}

/* Ceiling */
.g-ceiling {
  position:absolute;
  left:-2000px; right:-2000px;
  top:0; height:30vh;
  transform-origin: top center;
  transform: rotateX(-75deg) translateY(-100%);
  background: #090808;
}

/* Back wall (end of corridor) */
.g-back-wall {
  position:absolute;
  left: 50%; top:0; bottom:0;
  width:600px;
  transform: translateX(-50%) translateZ(-1800px);
  background: var(--wall-color);
  display:flex; align-items:center; justify-content:center;
}
.g-back-wall-text {
  font-family:'Noto Serif KR',serif;
  font-size:18px; color:rgba(201,169,110,0.2);
  letter-spacing:0.15em; writing-mode:vertical-rl;
}

/* Baseboard trim */
.g-trim-bottom {
  position:absolute;
  left:-2000px; right:-2000px;
  bottom:0; height:8px;
  background: linear-gradient(to top, #3a2e20, #1a150f);
  transform-origin: bottom center;
  transform: rotateX(75deg) translateY(100%) translateZ(1px);
}

/* Wainscoting top */
.g-wainscot {
  position:absolute;
  left:0; right:0;
  top:58%; height:2px;
  background: linear-gradient(90deg, transparent 2%, rgba(201,169,110,0.2) 10%, rgba(201,169,110,0.2) 90%, transparent 98%);
}

/* ═══════════════════════════════
   ARTWORKS ON WALLS
═══════════════════════════════ */
.art-cluster {
  position:absolute;
  top:0; bottom:0;
  display:flex; align-items:center;
  transform-style: preserve-3d;
}

/* Each picture hanging */
.pic-wrap {
  position:relative;
  margin: 0 28px;
  cursor:pointer;
  transition: filter 0.3s;
  flex-shrink:0;
}
.pic-wrap:hover { filter: brightness(1.25); }

.pic-frame {
  position:relative;
  border: 5px solid var(--frame-dark);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.6),
    4px 6px 24px rgba(0,0,0,0.7),
    0 0 0 1px rgba(201,169,110,0.12),
    -1px -1px 0 rgba(201,169,110,0.08);
  background: #151210;
  overflow:hidden;
  transition: box-shadow 0.3s, border-color 0.3s;
}
.pic-wrap:hover .pic-frame {
  border-color: var(--frame-mid);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.6),
    4px 6px 24px rgba(0,0,0,0.7),
    0 0 0 1px rgba(201,169,110,0.3),
    0 0 30px rgba(201,169,110,0.1);
}
/* frame inner gold line */
.pic-frame::before {
  content:'';
  position:absolute; inset:3px;
  border:1px solid rgba(201,169,110,0.18);
  pointer-events:none; z-index:2;
}

.pic-canvas {
  display:block;
  width:100%; height:100%;
  object-fit:cover;
  background: #1a1614;
}
.pic-placeholder {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:8px;
  background:linear-gradient(135deg,#1e1a17 0%,#141210 100%);
}
.pic-placeholder .ph-icon { font-size:28px; opacity:0.2; }
.pic-placeholder .ph-num { font-size:10px; color:rgba(201,169,110,0.35); letter-spacing:0.2em; }

/* spotlight cone above painting */
.pic-spot {
  position:absolute;
  bottom:100%; left:50%;
  transform:translateX(-50%);
  width:0; height:0;
  border-left:30px solid transparent;
  border-right:30px solid transparent;
  border-top:60px solid rgba(255,240,180,0.06);
  pointer-events:none;
}
.pic-spot-glow {
  position:absolute;
  bottom:100%; left:50%;
  transform:translateX(-50%) translateY(10px);
  width:80px; height:40px;
  background:radial-gradient(ellipse, rgba(255,245,200,0.12) 0%, transparent 70%);
  pointer-events:none;
}

/* label plate below */
.pic-plate {
  position:absolute;
  top:calc(100% + 10px); left:50%;
  transform:translateX(-50%);
  background:rgba(22,18,14,0.9);
  border:1px solid rgba(201,169,110,0.2);
  padding:6px 12px;
  text-align:center;
  white-space:nowrap;
  min-width:100px;
}
.plate-name { font-size:11px; color:var(--text-muted); display:block; }
.plate-title { font-size:12px; color:var(--gold); display:block; margin-top:1px; }

/* ROOM ENTRANCE SIGN */
.room-sign {
  position:absolute;
  top:14%; left:50%;
  transform:translateX(-50%);
  text-align:center;
  pointer-events:none;
  width:280px;
}
.sign-box {
  display:inline-block;
  border:1px solid rgba(201,169,110,0.25);
  padding:8px 28px;
  background:rgba(10,8,6,0.8);
}
.sign-num { font-size:10px; letter-spacing:0.35em; color:var(--gold); margin-bottom:3px; }
.sign-name { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--text); letter-spacing:0.05em; }

/* ═══════════════════════════════
   SCROLL STRIP (horizontal walk)
═══════════════════════════════ */
.scroll-track {
  position:absolute; inset:0;
  display:flex; align-items:center;
  will-change: transform;
  transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94);
}

/* ═══════════════════════════════
   LIGHTBOX
═══════════════════════════════ */
#lightbox {
  position:fixed; inset:0; z-index:400;
  background:rgba(3,3,6,0.96);
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(12px);
}
#lightbox.active { display:flex; animation:lbIn 0.35s ease; }
@keyframes lbIn { from{opacity:0;} to{opacity:1;} }

.lb-inner {
  display:flex; gap:52px; align-items:flex-start;
  max-width:1000px; width:92%;
  animation:lbSlide 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes lbSlide {
  from{transform:translateY(28px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.lb-img-wrap {
  flex:0 0 auto;
  border:5px solid var(--frame-dark);
  box-shadow: 0 0 0 1px rgba(201,169,110,0.2), 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,169,110,0.08);
  background:#151210; position:relative; overflow:hidden;
}
.lb-img-wrap::before {
  content:''; position:absolute; inset:3px;
  border:1px solid rgba(201,169,110,0.2); pointer-events:none; z-index:2;
}
.lb-img { display:block; max-width:420px; max-height:62vh; object-fit:contain; }
.lb-no-img {
  width:280px; height:340px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
.lb-no-img .ni-icon { font-size:56px; opacity:0.2; }
.lb-no-img .ni-txt { font-size:11px; color:rgba(201,169,110,0.4); letter-spacing:0.2em; }

.lb-info { flex:1; min-width:0; padding-top:8px; }
.lb-room-tag { font-size:10px; letter-spacing:0.4em; color:var(--gold); text-transform:uppercase; margin-bottom:18px; }
.lb-art-title { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:300; color:var(--text); line-height:1.35; margin-bottom:6px; }
.lb-student { font-size:15px; color:var(--gold-light); margin-bottom:26px; letter-spacing:0.05em; }
.lb-sep { width:44px; height:1px; background:linear-gradient(90deg,var(--gold),transparent); margin-bottom:22px; }
.lb-desc { font-size:13px; color:var(--text-muted); line-height:1.9; white-space:pre-line; }
.lb-meta { display:flex; gap:20px; margin-top:30px; flex-wrap:wrap; }
.lb-meta-item { font-size:10px; letter-spacing:0.1em; color:var(--text-muted); }
.lb-meta-item strong { display:block; font-size:13px; color:var(--gold); margin-top:3px; font-weight:400; }

.lb-close-btn {
  position:fixed; top:24px; right:28px;
  background:none; border:1px solid rgba(201,169,110,0.3);
  color:var(--gold); width:38px; height:38px;
  border-radius:50%; font-size:18px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.lb-close-btn:hover { background:rgba(201,169,110,0.15); }
.lb-nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  background:rgba(201,169,110,0.1); border:1px solid rgba(201,169,110,0.3);
  color:var(--gold); width:46px; height:46px; border-radius:2px;
  font-size:24px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; z-index:401;
}
.lb-nav-btn:hover { background:rgba(201,169,110,0.2); }
.lb-nav-btn.prev { left:16px; }
.lb-nav-btn.next { right:16px; }

/* ═══════════════════════════════
   EDIT PANEL
═══════════════════════════════ */
#edit-panel {
  position:fixed; inset:0; z-index:600;
  background:rgba(5,5,10,0.98);
  display:none; flex-direction:column;
  overflow:hidden;
}
#edit-panel.active { display:flex; }
.ep-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 32px; border-bottom:1px solid rgba(201,169,110,0.15);
  flex-shrink:0;
}
.ep-title { font-family:'Noto Serif KR',serif; font-size:18px; color:var(--gold-light); }
.ep-actions { display:flex; gap:10px; }
.ep-btn {
  background:none; border:1px solid rgba(201,169,110,0.3);
  color:var(--gold); font-family:'Noto Sans KR',sans-serif;
  font-size:12px; padding:7px 20px; border-radius:2px;
  cursor:pointer; transition:all 0.2s;
}
.ep-btn:hover { background:rgba(201,169,110,0.1); }
.ep-btn.primary { background:rgba(201,169,110,0.2); border-color:var(--gold); }

.ep-tabs { display:flex; gap:0; padding:0 32px; border-bottom:1px solid rgba(201,169,110,0.1); flex-shrink:0; }
.ep-tab {
  padding:12px 20px; font-size:13px; color:var(--text-muted);
  cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  letter-spacing:0.05em;
}
.ep-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

.ep-body { flex:1; overflow-y:auto; padding:28px 32px; }
.ep-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
.ep-card {
  background:rgba(26,21,18,0.8); border:1px solid rgba(201,169,110,0.12);
  border-radius:4px; padding:18px;
}
.ep-card h4 { font-size:12px; color:var(--gold); letter-spacing:0.15em; margin-bottom:14px; text-transform:uppercase; }
.ep-field { margin-bottom:11px; }
.ep-field label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:5px; letter-spacing:0.08em; }
.ep-field input, .ep-field textarea, .ep-field select {
  width:100%; background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,169,110,0.18);
  color:var(--text); font-family:'Noto Sans KR',sans-serif;
  font-size:12px; padding:7px 10px; border-radius:2px;
  outline:none; transition:border-color 0.2s; resize:vertical;
}
.ep-field input:focus, .ep-field textarea:focus, .ep-field select:focus { border-color:var(--gold); }
.ep-field select option { background:#1a1614; }
.ep-upload-label {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:8px; cursor:pointer;
  background:rgba(201,169,110,0.06);
  border:1px dashed rgba(201,169,110,0.25);
  color:rgba(201,169,110,0.7); font-size:11px;
  border-radius:2px; transition:all 0.2s; letter-spacing:0.05em;
}
.ep-upload-label:hover { background:rgba(201,169,110,0.12); color:var(--gold); }
.ep-preview { width:100%; max-height:90px; object-fit:cover; border-radius:2px; margin-top:6px; display:none; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(201,169,110,0.3); border-radius:2px; }
</style>
</head>
<body>

<!-- ════════════ INTRO ════════════ -->
<div id="intro">
  <div class="intro-glow"></div>
  <div class="intro-rings">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  </div>
  <div class="intro-corner tl"></div><div class="intro-corner tr"></div>
  <div class="intro-corner bl"></div><div class="intro-corner br"></div>

  <p class="intro-badge">Maetan Middle School · 2026</p>
  <h1 class="intro-title">
    2026학년도 매탄중 자유학기<br>
    주제선택(<em>미술창의조형</em>) 갤러리
  </h1>
  <p class="intro-sub">Art Creative &amp; Formative Gallery</p>
  <div class="intro-line"></div>
  <p class="intro-cta">클릭하여 로비 입장</p>

  <div class="lobby">
    <div class="lobby-door" onclick="enterRoom(0)">
      <div class="door-arch"><span class="door-num">I</span></div>
      <div class="door-label">제1전시실<br>소묘 · 드로잉</div>
    </div>
    <div class="lobby-door" onclick="enterRoom(1)">
      <div class="door-arch"><span class="door-num">II</span></div>
      <div class="door-label">제2전시실<br>수채화</div>
    </div>
    <div class="lobby-door" onclick="enterRoom(2)">
      <div class="door-arch"><span class="door-num">III</span></div>
      <div class="door-label">제3전시실<br>아크릴화</div>
    </div>
  </div>
</div>

<!-- ════════════ GALLERY ════════════ -->
<div id="gallery">
  <!-- HUD top -->
  <div class="hud">
    <div class="hud-left">
      <button class="hud-back" onclick="goLobby()">← 로비</button>
      <div>
        <div class="hud-room-name" id="hud-room-name">제1전시실</div>
        <div class="hud-room-sub" id="hud-room-sub">소묘 · 드로잉</div>
      </div>
    </div>
    <div class="hud-right">
      <button class="hud-room-btn" id="rbtn0" onclick="switchRoom(0)">제1전시실</button>
      <button class="hud-room-btn" id="rbtn1" onclick="switchRoom(1)">제2전시실</button>
      <button class="hud-room-btn" id="rbtn2" onclick="switchRoom(2)">제3전시실</button>
      <button class="hud-room-btn" style="margin-left:6px;border-color:rgba(201,169,110,0.5);" onclick="openEdit()">✏ 편집</button>
    </div>
  </div>

  <!-- VIEWPORT -->
  <div class="viewport" id="viewport">
    <div class="world">
      <div class="scene3d">
        <!-- floor & ceiling -->
        <div class="g-floor"></div>
        <div class="g-ceiling"></div>
        <div class="g-back-wall">
          <div class="g-back-wall-text" id="back-wall-text">소묘 · 드로잉</div>
        </div>
        <!-- wainscot -->
        <div class="g-wainscot"></div>

        <!-- SCROLL TRACK — artworks live here -->
        <div class="scroll-track" id="scrollTrack">
          <!-- room sign pinned to left -->
          <div class="room-sign" id="roomSign" style="position:relative;flex-shrink:0;margin-right:0;left:0;top:auto;transform:none;align-self:flex-start;padding-top:12%;">
            <div class="sign-box">
              <div class="sign-num" id="sign-num">ROOM I</div>
              <div class="sign-name" id="sign-name">소묘 · 드로잉</div>
            </div>
          </div>
          <!-- artworks injected by JS -->
        </div>
      </div>
    </div>
    <div class="hint">← → 키 또는 하단 화살표로 이동 · 작품 클릭 시 상세보기</div>
  </div>

  <!-- HUD bottom -->
  <div class="hud-bottom">
    <div class="nav-arrows">
      <button class="arr-btn" onclick="walk(-1)" title="뒤로">←</button>
      <button class="arr-btn" onclick="walk(1)" title="앞으로">→</button>
    </div>
    <div class="progress-info">
      <span id="prog-text">1 / 26</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:4%"></div></div>
    </div>
  </div>
</div>

<!-- ════════════ LIGHTBOX ════════════ -->
<div id="lightbox">
  <button class="lb-close-btn" onclick="closeLb()">✕</button>
  <button class="lb-nav-btn prev" onclick="lbNav(-1)">‹</button>
  <div class="lb-inner">
    <div class="lb-img-wrap" id="lb-img-wrap"></div>
    <div class="lb-info">
      <p class="lb-room-tag" id="lb-room-tag"></p>
      <h2 class="lb-art-title" id="lb-art-title"></h2>
      <p class="lb-student" id="lb-student"></p>
      <div class="lb-sep"></div>
      <p class="lb-desc" id="lb-desc"></p>
      <div class="lb-meta">
        <div class="lb-meta-item">학년<strong id="lb-grade"></strong></div>
        <div class="lb-meta-item">재료<strong id="lb-medium"></strong></div>
        <div class="lb-meta-item">전시실<strong id="lb-room"></strong></div>
      </div>
    </div>
  </div>
  <button class="lb-nav-btn next" onclick="lbNav(1)">›</button>
</div>

<!-- ════════════ EDIT PANEL ════════════ -->
<div id="edit-panel">
  <div class="ep-header">
    <h2 class="ep-title">✏ 작품 정보 편집</h2>
    <div class="ep-actions">
      <button class="ep-btn" onclick="closeEdit()">닫기</button>
    </div>
  </div>
  <div class="ep-tabs">
    <div class="ep-tab active" onclick="showEpTab(0,this)">제1전시실 · 소묘</div>
    <div class="ep-tab" onclick="showEpTab(1,this)">제2전시실 · 수채화</div>
    <div class="ep-tab" onclick="showEpTab(2,this)">제3전시실 · 아크릴화</div>
  </div>
  <div class="ep-body">
    <div class="ep-grid" id="ep-grid-0"></div>
    <div class="ep-grid" id="ep-grid-1" style="display:none"></div>
    <div class="ep-grid" id="ep-grid-2" style="display:none"></div>
  </div>
</div>

<script>
/* ─────────────────────────────────
   DATA  (26명 × 2작품 × 3전시실)
───────────────────────────────── */
const ROOMS = [
  { id:0, num:'I',   name:'소묘 · 드로잉', medium:'연필·목탄' },
  { id:1, num:'II',  name:'수채화',         medium:'수채화' },
  { id:2, num:'III', name:'아크릴화',        medium:'아크릴' },
];

function makeStudents() {
  const names = [
    '김민준','이서연','박지호','최수아','정예진','한도윤','윤채원','강민서',
    '임주원','신유나','오태양','배소희','황지민','조현우','문아린','류성진',
    '서다은','안준혁','노하은','고민재','송예원','전도현','변수진','우태민',
    '심나영','권성현'
  ];
  const arts = [];
  let id = 1;
  ROOMS.forEach(room => {
    names.forEach((name, si) => {
      for (let w = 0; w < 2; w++) {
        arts.push({
          id: id++,
          room: room.id,
          student: `1학년 ${name}`,
          grade: '1학년',
          title: w === 0 ? `${name.slice(1)}의 첫 번째 작품` : `${name.slice(1)}의 두 번째 작품`,
          medium: room.medium,
          desc: `${name} 학생이 ${room.name} 수업에서 완성한 작품입니다.\n작품에 담긴 생각과 감정을 자유롭게 표현했습니다.`,
          img: '',
        });
      }
    });
  });
  return arts;
}

const artworks = makeStudents();

/* ─────────────────────────────────
   STATE
───────────────────────────────── */
let currentRoom = 0;
let scrollPos = 0;   // index of leftmost visible "group" (pair)
let lbIdx = 0;
let STEP_PX = 0;

/* ─────────────────────────────────
   INTRO → GALLERY
───────────────────────────────── */
document.getElementById('intro').addEventListener('click', function(e) {
  if (!e.target.closest('.lobby-door')) enterRoom(0);
});

function enterRoom(roomIdx) {
  currentRoom = roomIdx;
  scrollPos = 0;
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('gallery').classList.add('active');
    buildRoom();
    updateHUD();
    buildAllEditGrids();
  }, 1100);
}

function goLobby() {
  document.getElementById('gallery').classList.remove('active');
  const intro = document.getElementById('intro');
  intro.style.display = 'flex';
  intro.style.opacity = '0';
  intro.classList.remove('fade-out');
  requestAnimationFrame(() => { intro.style.transition = 'opacity 0.6s'; intro.style.opacity = '1'; });
}

/* ─────────────────────────────────
   BUILD ROOM
───────────────────────────────── */
function buildRoom() {
  const track = document.getElementById('scrollTrack');
  // clear previous artworks (keep sign)
  const sign = document.getElementById('roomSign');
  track.innerHTML = '';
  track.appendChild(sign);

  const room = ROOMS[currentRoom];
  document.getElementById('sign-num').textContent = `ROOM ${room.num}`;
  document.getElementById('sign-name').textContent = room.name;
  document.getElementById('back-wall-text').textContent = room.name;

  // get artworks for this room
  const roomArts = artworks.filter(a => a.room === currentRoom);
  // group into pairs (2 per student)
  const pairs = [];
  for (let i = 0; i < roomArts.length; i += 2) {
    pairs.push(roomArts.slice(i, i + 2));
  }

  // Determine sizes
  const vw = window.innerWidth;
  const bigW = Math.min(200, Math.round(vw * 0.17));
  const bigH = Math.round(bigW * 1.3);
  const smW  = Math.round(bigW * 0.72);
  const smH  = Math.round(smW * 1.2);
  STEP_PX = bigW + smW + 110; // how much we scroll per step

  pairs.forEach((pair, pi) => {
    const group = document.createElement('div');
    group.className = 'art-cluster';
    group.style.cssText = `gap:0; padding: 0 30px; flex-shrink:0; position:relative;`;

    pair.forEach((art, wi) => {
      const w = wi === 0 ? bigW : smW;
      const h = wi === 0 ? bigH : smH;
      const wrap = document.createElement('div');
      wrap.className = 'pic-wrap';
      wrap.style.cssText = `margin:0 ${wi===0?'16px':'12px'};`;
      wrap.onclick = () => openLb(art.id);
      wrap.innerHTML = `
        <div class="pic-spot-glow"></div>
        <div class="pic-spot"></div>
        <div class="pic-frame" style="width:${w}px;height:${h}px;">
          ${art.img
            ? `<img class="pic-canvas" src="${art.img}" alt="${art.title}" style="width:${w}px;height:${h}px;">`
            : `<div class="pic-placeholder" style="width:${w}px;height:${h}px;">
                 <div class="ph-icon">🖼</div>
                 <div class="ph-num">NO.${art.id}</div>
               </div>`
          }
        </div>
        <div class="pic-plate">
          <span class="plate-name">${art.student}</span>
          <span class="plate-title">${art.title}</span>
        </div>`;
      group.appendChild(wrap);
    });

    // divider line between groups
    if (pi < pairs.length - 1) {
      const div = document.createElement('div');
      div.style.cssText = `width:1px;height:60%;background:rgba(201,169,110,0.08);flex-shrink:0;margin:0 18px;align-self:center;`;
      group.appendChild(div);
    }

    track.appendChild(group);
  });

  // padding at end
  const end = document.createElement('div');
  end.style.cssText = `flex-shrink:0;width:${vw*0.3}px;`;
  track.appendChild(end);

  scrollPos = 0;
  applyScroll(true);
}

/* ─────────────────────────────────
   SCROLL / WALK
───────────────────────────────── */
let totalSteps = 26; // 26 pairs per room

function walk(dir) {
  const roomArts = artworks.filter(a => a.room === currentRoom);
  const maxStep = Math.ceil(roomArts.length / 2) - 1;
  scrollPos = Math.max(0, Math.min(maxStep, scrollPos + dir));
  applyScroll();
  updateProgress();
}

function applyScroll(instant) {
  const track = document.getElementById('scrollTrack');
  const vw = window.innerWidth;
  const offset = -scrollPos * STEP_PX + vw * 0.05;
  if (instant) {
    track.style.transition = 'none';
    track.style.transform = `translateX(${offset}px)`;
    setTimeout(() => { track.style.transition = 'transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94)'; }, 30);
  } else {
    track.style.transform = `translateX(${offset}px)`;
  }
}

function updateProgress() {
  const roomArts = artworks.filter(a => a.room === currentRoom);
  const total = Math.ceil(roomArts.length / 2);
  const cur = scrollPos + 1;
  document.getElementById('prog-text').textContent = `${cur} / ${total}`;
  document.getElementById('prog-bar').style.width = `${(cur/total)*100}%`;
}

/* ─────────────────────────────────
   SWITCH ROOM
───────────────────────────────── */
function switchRoom(idx) {
  currentRoom = idx;
  scrollPos = 0;
  buildRoom();
  updateHUD();
}

function updateHUD() {
  const r = ROOMS[currentRoom];
  document.getElementById('hud-room-name').textContent = `제${r.num}전시실`;
  document.getElementById('hud-room-sub').textContent = r.name;
  document.querySelectorAll('.hud-room-btn').forEach((b,i) => b.classList.toggle('active', i===currentRoom));
  updateProgress();
}

/* ─────────────────────────────────
   KEYBOARD
───────────────────────────────── */
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('active')) {
    if (e.key==='ArrowRight') lbNav(1);
    if (e.key==='ArrowLeft') lbNav(-1);
    if (e.key==='Escape') closeLb();
    return;
  }
  if (document.getElementById('edit-panel').classList.contains('active')) return;
  if (e.key==='ArrowRight') walk(1);
  if (e.key==='ArrowLeft') walk(-1);
});

/* drag/swipe */
let dragStartX = null;
document.getElementById('viewport').addEventListener('mousedown', e => { dragStartX = e.clientX; });
document.addEventListener('mouseup', e => {
  if (dragStartX===null) return;
  const dx = e.clientX - dragStartX;
  if (Math.abs(dx) > 40) walk(dx < 0 ? 1 : -1);
  dragStartX = null;
});
document.getElementById('viewport').addEventListener('touchstart', e => { dragStartX = e.touches[0].clientX; }, {passive:true});
document.getElementById('viewport').addEventListener('touchend', e => {
  if (dragStartX===null) return;
  const dx = e.changedTouches[0].clientX - dragStartX;
  if (Math.abs(dx) > 40) walk(dx < 0 ? 1 : -1);
  dragStartX = null;
});

/* ─────────────────────────────────
   LIGHTBOX
───────────────────────────────── */
function openLb(id) {
  lbIdx = artworks.findIndex(a => a.id === id);
  fillLb();
  document.getElementById('lightbox').classList.add('active');
}
function fillLb() {
  const art = artworks[lbIdx];
  const room = ROOMS[art.room];
  document.getElementById('lb-room-tag').textContent = `매탄중학교 · ${room.name}`;
  document.getElementById('lb-art-title').textContent = art.title;
  document.getElementById('lb-student').textContent = art.student;
  document.getElementById('lb-desc').textContent = art.desc;
  document.getElementById('lb-grade').textContent = art.grade;
  document.getElementById('lb-medium').textContent = art.medium;
  document.getElementById('lb-room').textContent = `제${room.num}전시실`;

  const wrap = document.getElementById('lb-img-wrap');
  if (art.img) {
    wrap.innerHTML = `<img class="lb-img" src="${art.img}" alt="${art.title}">`;
  } else {
    wrap.innerHTML = `<div class="lb-no-img"><div class="ni-icon">🖼</div><div class="ni-txt">이미지 준비 중</div></div>`;
  }
}
function closeLb() { document.getElementById('lightbox').classList.remove('active'); }
function lbNav(d) {
  lbIdx = (lbIdx + d + artworks.length) % artworks.length;
  fillLb();
}
document.getElementById('lightbox').addEventListener('click', e => { if(e.target===document.getElementById('lightbox')) closeLb(); });

/* ─────────────────────────────────
   EDIT PANEL
───────────────────────────────── */
function buildAllEditGrids() {
  ROOMS.forEach(room => {
    const grid = document.getElementById(`ep-grid-${room.id}`);
    grid.innerHTML = '';
    const roomArts = artworks.filter(a => a.room === room.id);
    roomArts.forEach((art, i) => {
      const globalIdx = artworks.indexOf(art);
      const card = document.createElement('div');
      card.className = 'ep-card';
      card.innerHTML = `
        <h4>작품 ${art.id} · ${art.student}</h4>
        <div class="ep-field"><label>학생명</label>
          <input type="text" value="${art.student}" onchange="artworks[${globalIdx}].student=this.value;buildRoom();">
        </div>
        <div class="ep-field"><label>작품 제목</label>
          <input type="text" value="${art.title}" onchange="artworks[${globalIdx}].title=this.value;buildRoom();">
        </div>
        <div class="ep-field"><label>학년</label>
          <input type="text" value="${art.grade}" onchange="artworks[${globalIdx}].grade=this.value;">
        </div>
        <div class="ep-field"><label>재료·기법</label>
          <input type="text" value="${art.medium}" onchange="artworks[${globalIdx}].medium=this.value;">
        </div>
        <div class="ep-field"><label>작품 설명</label>
          <textarea rows="3" onchange="artworks[${globalIdx}].desc=this.value;">${art.desc}</textarea>
        </div>
        <div class="ep-field"><label>이미지 업로드</label>
          <label class="ep-upload-label" for="epimg-${art.id}">📁 이미지 선택 (JPG/PNG)</label>
          <input type="file" id="epimg-${art.id}" accept="image/*" style="display:none" data-gidx="${globalIdx}">
          <img class="ep-preview" id="epprev-${art.id}" ${art.img?`src="${art.img}"`:''}style="${art.img?'display:block':''}">
        </div>`;
      grid.appendChild(card);

      card.querySelector(`#epimg-${art.id}`).addEventListener('change', function() {
        const file = this.files[0]; if (!file) return;
        const gi = parseInt(this.dataset.gidx);
        const reader = new FileReader();
        reader.onload = ev => {
          artworks[gi].img = ev.target.result;
          const prev = document.getElementById(`epprev-${artworks[gi].id}`);
          prev.src = ev.target.result; prev.style.display = 'block';
          buildRoom();
        };
        reader.readAsDataURL(file);
      });
    });
  });
}

function showEpTab(idx, el) {
  document.querySelectorAll('.ep-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.ep-grid').forEach((g,i) => g.style.display = i===idx?'grid':'none');
}
function openEdit() { buildAllEditGrids(); document.getElementById('edit-panel').classList.add('active'); }
function closeEdit() {
  document.getElementById('edit-panel').classList.remove('active');
  buildRoom();
}
</script>
</body>
</html>
