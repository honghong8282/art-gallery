<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026학년도 매탄중학교 1학년 미술작품 전시관</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060a;overflow:hidden;font-family:Georgia,serif}
#wrap{width:100vw;height:100vh;position:relative;overflow:hidden;background:#08060a}
canvas#c{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0}
.screen{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s ease}
.screen.hidden{opacity:0;pointer-events:none}
.screen.gone{display:none}
#s-entrance{background:#08060a}
#ent-particles{position:absolute;inset:0;width:100%;height:100%}
#ent-deco-top{width:1px;height:0;background:linear-gradient(to bottom,transparent,#c8a060);position:absolute;top:0;left:50%;transition:height 1.4s ease 0.2s}
#ent-deco-bot{width:1px;height:0;background:linear-gradient(to top,transparent,#c8a060);position:absolute;bottom:0;left:50%;transition:height 1.4s ease 0.2s}
#ent-deco-left{height:1px;width:0;background:linear-gradient(to right,transparent,#c8a060);position:absolute;left:0;top:50%;transition:width 1.4s ease 0.2s}
#ent-deco-right{height:1px;width:0;background:linear-gradient(to left,transparent,#c8a060);position:absolute;right:0;top:50%;transition:width 1.4s ease 0.2s}
#ent-frame{border:0.5px solid rgba(200,160,96,0);padding:36px 56px;text-align:center;position:relative;transition:border-color 1s ease 0.8s}
#ent-frame.show{border-color:rgba(200,160,96,0.25)}
#ent-frame::before,#ent-frame::after{content:'';position:absolute;width:18px;height:18px;border-color:#c8a060;border-style:solid;opacity:0;transition:opacity 1s ease 1.2s}
#ent-frame::before{top:-1px;left:-1px;border-width:1px 0 0 1px}
#ent-frame::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
#ent-frame.show::before,#ent-frame.show::after{opacity:1}
.ent-year{color:#8a7a5a;font-size:12px;letter-spacing:6px;opacity:0;transform:translateY(8px);transition:all 0.8s ease;font-family:sans-serif}
.ent-school{color:#e8d9b8;font-size:24px;letter-spacing:6px;margin-top:12px;opacity:0;transform:translateY(10px);transition:all 0.8s ease}
.ent-divider{width:0;height:0.5px;background:linear-gradient(to right,transparent,#c8a060,transparent);margin:18px auto;transition:width 1s ease}
.ent-title{color:#f0e4c0;font-size:15px;letter-spacing:5px;opacity:0;transform:translateY(8px);transition:all 0.8s ease;line-height:2}
.ent-sub{color:#6a5a3a;font-size:10px;letter-spacing:4px;margin-top:8px;opacity:0;transition:opacity 0.8s ease;font-family:sans-serif}
.ent-btn{margin-top:32px;padding:12px 44px;background:transparent;border:0.5px solid rgba(200,160,96,0.4);color:#c8a060;font-size:11px;letter-spacing:5px;cursor:pointer;opacity:0;transition:all 0.8s ease;font-family:sans-serif}
.ent-btn:hover{background:rgba(200,160,96,0.08);border-color:rgba(200,160,96,0.8);color:#e8c87a}
.show-el{opacity:1!important;transform:translateY(0)!important}
#s-rooms{background:rgba(8,6,10,0.97);padding:24px}
#s-rooms h2{color:#e8d9b8;font-size:17px;letter-spacing:5px;text-align:center;margin-bottom:5px}
#s-rooms .sub{color:#6a5a3a;font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:24px;font-family:sans-serif}
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:660px}
.room-card{background:#110e08;border:0.5px solid rgba(200,160,96,0.2);padding:20px 16px;cursor:pointer;position:relative;transition:all 0.3s;text-align:center}
.room-card:hover{border-color:rgba(200,160,96,0.6);background:#1a1610}
.room-card .room-num{color:#c8a060;font-size:10px;letter-spacing:3px;margin-bottom:10px;font-family:sans-serif}
.room-card .room-name{color:#e8d9b8;font-size:13px;letter-spacing:1px;line-height:1.6}
.room-card .room-edit{position:absolute;top:7px;right:9px;background:none;border:0.5px solid rgba(200,160,96,0.2);color:#6a5a3a;font-size:9px;padding:2px 7px;cursor:pointer;font-family:sans-serif;border-radius:2px}
.room-card .room-edit:hover{color:#c8a060;border-color:#c8a060}
.room-card .room-corner{position:absolute;width:9px;height:9px;border-color:#c8a060;border-style:solid;opacity:0.3}
.room-card .room-corner.tl{top:5px;left:5px;border-width:1px 0 0 1px}
.room-card .room-corner.br{bottom:5px;right:20px;border-width:0 1px 1px 0}
.back-btn{background:none;border:0.5px solid rgba(200,160,96,0.25);color:#8a7a5a;font-size:10px;letter-spacing:2px;padding:8px 22px;cursor:pointer;margin-top:18px;font-family:sans-serif}
.back-btn:hover{color:#c8a060;border-color:#c8a060}
#s-class{background:rgba(8,6,10,0.97);padding:28px}
#s-class h2{color:#e8d9b8;font-size:16px;letter-spacing:5px;text-align:center;margin-bottom:5px}
#s-class .sub{color:#6a5a3a;font-size:10px;letter-spacing:2px;text-align:center;margin-bottom:8px;font-family:sans-serif}
#selected-room-name{color:#c8a060;font-size:12px;letter-spacing:3px;text-align:center;margin-bottom:22px;font-family:sans-serif}
.class-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;max-width:440px}
.class-btn{background:#110e08;border:0.5px solid rgba(200,160,96,0.2);color:#e8d9b8;padding:18px 10px;cursor:pointer;text-align:center;transition:all 0.3s;font-family:Georgia,serif}
.class-btn:hover{background:#1e1810;border-color:#c8a060;color:#f0e4c0}
.class-btn .cn{font-size:20px;letter-spacing:1px}
.class-btn .ct{color:#8a7a5a;font-size:9px;letter-spacing:2px;margin-top:5px;font-family:sans-serif}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;pointer-events:none;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,240,180,0.45)}
#crosshair::before{width:1px;height:14px;left:50%;top:0}
#crosshair::after{width:14px;height:1px;top:50%;left:0}
#controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:5px;z-index:5}
#wasd{display:grid;grid-template-columns:repeat(3,34px);grid-template-rows:repeat(2,34px);gap:3px}
.kb{background:rgba(232,217,184,0.08);border:0.5px solid rgba(232,217,184,0.18);color:#e8d9b8;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:3px;cursor:pointer;user-select:none}
.kb:active,.kb.pressed{background:rgba(232,217,184,0.22)}
.kb.empty{background:transparent;border:none;pointer-events:none}
#hint-txt{color:rgba(232,217,184,0.3);font-size:10px;letter-spacing:1px;font-family:sans-serif}
#room-info{position:absolute;top:14px;left:50%;transform:translateX(-50%);text-align:center;z-index:5;display:none;pointer-events:none}
#room-name-hud{color:#e8d9b8;font-size:15px;letter-spacing:3px}
#room-sub-hud{color:#6a5a3a;font-size:10px;letter-spacing:2px;margin-top:3px;font-family:sans-serif}
#interact-hint{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(8,6,4,0.82);border:0.5px solid rgba(200,160,96,0.3);color:#c8a060;padding:6px 18px;font-size:11px;letter-spacing:2px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:5;font-family:sans-serif;display:none}
#interact-hint.show{opacity:1}
#exit-btn{position:absolute;top:14px;right:16px;background:rgba(8,6,4,0.7);border:0.5px solid rgba(200,160,96,0.2);color:#8a7a5a;font-size:10px;letter-spacing:2px;padding:6px 14px;cursor:pointer;z-index:5;display:none;font-family:sans-serif}
#exit-btn:hover{color:#c8a060;border-color:#c8a060}
#modal{position:absolute;inset:0;background:rgba(4,3,2,0.93);display:none;align-items:center;justify-content:center;z-index:20}
#modal.open{display:flex}
#mbox{background:#100d08;border:0.5px solid rgba(200,160,96,0.2);max-width:440px;width:88%;position:relative}
#mclose{position:absolute;top:10px;right:14px;background:none;border:none;color:#6a5a3a;font-size:18px;cursor:pointer;z-index:1}
#mclose:hover{color:#e8d9b8}
#mart-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:#1a1410;position:relative}
#mart-img{width:100%;height:100%;object-fit:cover;display:block}
#mart-fallback{width:100%;height:100%;position:absolute;top:0;left:0}
#minfo{padding:18px 22px 22px}
#mtitle{color:#e8d9b8;font-size:17px;letter-spacing:1px}
#mline{width:30px;height:0.5px;background:#c8a060;margin:11px 0;opacity:0.4}
#mmeta{color:#8a7a5a;font-size:11px;letter-spacing:1px;font-family:sans-serif}
#mdesc{color:#a09070;font-size:13px;margin-top:10px;line-height:1.7;font-family:sans-serif}
#edit-modal{position:absolute;inset:0;background:rgba(4,3,2,0.93);display:none;align-items:center;justify-content:center;z-index:30}
#edit-modal.open{display:flex}
#ebox{background:#141008;border:0.5px solid rgba(200,160,96,0.25);padding:30px 34px;max-width:360px;width:88%;text-align:center}
#ebox h3{color:#e8d9b8;font-size:15px;letter-spacing:2px;margin-bottom:18px}
#ebox input{width:100%;background:#0a0806;border:0.5px solid rgba(200,160,96,0.3);color:#e8d9b8;padding:11px 15px;font-size:13px;font-family:Georgia,serif;margin-bottom:16px;outline:none}
#ebox input:focus{border-color:#c8a060}
.ebtns{display:flex;gap:12px;justify-content:center}
.ebtn{padding:9px 26px;background:transparent;border:0.5px solid rgba(200,160,96,0.35);color:#c8a060;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:sans-serif}
.ebtn.cancel{border-color:rgba(200,160,96,0.15);color:#6a5a3a}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="crosshair"></div>
  <div id="s-entrance" class="screen">
    <canvas id="ent-particles"></canvas>
    <div id="ent-deco-top"></div><div id="ent-deco-bot"></div>
    <div id="ent-deco-left"></div><div id="ent-deco-right"></div>
    <div id="ent-frame">
      <div class="ent-year" id="ey" style="opacity:0;transform:translateY(8px)">2026 학년도</div>
      <div class="ent-school" id="es" style="opacity:0;transform:translateY(10px)">매탄중학교</div>
      <div class="ent-divider" id="ed"></div>
      <div class="ent-title" id="et" style="opacity:0;transform:translateY(8px)">1학년 미술작품<br>전시관</div>
      <div class="ent-sub" id="esub" style="opacity:0">ART EXHIBITION · GRADE 1 · 2026</div>
      <button class="ent-btn" id="ebtn" style="opacity:0" onclick="showRooms()">입 장 하 기</button>
    </div>
  </div>
  <div id="s-rooms" class="screen hidden gone">
    <h2>전 시 실 선 택</h2>
    <div class="sub">관람할 전시실을 선택하세요</div>
    <div class="rooms-grid" id="rooms-grid"></div>
    <button class="back-btn" onclick="goBack()">← 처음으로</button>
  </div>
  <div id="s-class" class="screen hidden gone">
    <h2>반 선 택</h2>
    <div class="sub">관람할 반을 선택하세요</div>
    <div id="selected-room-name"></div>
    <div class="class-grid">
      <div class="class-btn" onclick="enterGallery(1)"><div class="cn">1반</div><div class="ct">CLASS 1</div></div>
      <div class="class-btn" onclick="enterGallery(2)"><div class="cn">2반</div><div class="ct">CLASS 2</div></div>
      <div class="class-btn" onclick="enterGallery(3)"><div class="cn">3반</div><div class="ct">CLASS 3</div></div>
      <div class="class-btn" onclick="enterGallery(4)"><div class="cn">4반</div><div class="ct">CLASS 4</div></div>
      <div class="class-btn" onclick="enterGallery(5)"><div class="cn">5반</div><div class="ct">CLASS 5</div></div>
      <div class="class-btn" onclick="enterGallery(6)"><div class="cn">6반</div><div class="ct">CLASS 6</div></div>
      <div class="class-btn" onclick="enterGallery(7)"><div class="cn">7반</div><div class="ct">CLASS 7</div></div>
      <div class="class-btn" onclick="enterGallery(8)"><div class="cn">8반</div><div class="ct">CLASS 8</div></div>
    </div>
    <button class="back-btn" onclick="showRooms()" style="margin-top:16px">← 전시실로</button>
  </div>
  <div id="room-info"><div id="room-name-hud">갤러리</div><div id="room-sub-hud"></div></div>
  <div id="interact-hint">클릭하여 작품 감상</div>
  <button id="exit-btn" onclick="exitGallery()">← 나가기</button>
  <div id="controls">
    <div id="wasd">
      <div class="kb empty"></div><div class="kb" data-key="w">▲</div><div class="kb empty"></div>
      <div class="kb" data-key="a">◀</div><div class="kb" data-key="s">▼</div><div class="kb" data-key="d">▶</div>
    </div>
    <div id="hint-txt">WASD · 드래그로 이동</div>
  </div>
  <div id="modal">
    <div id="mbox">
      <button id="mclose" onclick="closeM()">✕</button>
      <div id="mart-wrap">
        <img id="mart-img" src="" style="display:none"/>
        <canvas id="mart-fallback" width="440" height="330"></canvas>
      </div>
      <div id="minfo">
        <div id="mtitle"></div><div id="mline"></div>
        <div id="mmeta"></div><div id="mdesc"></div>
      </div>
    </div>
  </div>
  <div id="edit-modal">
    <div id="ebox">
      <h3>전시실 이름 수정</h3>
      <input id="edit-input" type="text"/>
      <div class="ebtns">
        <button class="ebtn cancel" onclick="closeEdit()">취소</button>
        <button class="ebtn" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

const roomData = [
  {name:'그림문자 제작하기', fixed:true},
  {name:'풍속화 재구성하기', fixed:true},
  {name:'나의 미래모습 만들기', fixed:true},
  {name:'전시실 4', fixed:false},
  {name:'전시실 5', fixed:false},
  {name:'전시실 6', fixed:false},
];
const roomColors = [
  [0.52,0.38,0.18],[0.18,0.38,0.52],[0.18,0.52,0.38],
  [0.48,0.18,0.38],[0.38,0.48,0.18],[0.28,0.18,0.52]
];
const THEMES = [
  '그림문자 작품','풍속화 재구성','나의 미래모습','작품','창작 작품','자유 표현'
];

let currentRoom=null,currentClass=null,editIdx=null;
let galleryRenderer=null,galleryAnimId=null;
const wrap=document.getElementById('wrap');

function getArtworks(ri,cls){
  return Array.from({length:8},(_,i)=>({
    title:THEMES[ri],student:`${cls}반 ${i+1}번`,
    desc:`${cls}반 ${i+1}번 학생의 ${roomData[ri].name} 작품입니다.`,
    room:roomData[ri].name,color:roomColors[ri],
    img:STUDENT_IMAGES[cls+'_'+(i+1)]||null
  }));
}
function buildRoomsGrid(){
  const g=document.getElementById('rooms-grid');g.innerHTML='';
  roomData.forEach((r,i)=>{
    const card=document.createElement('div');card.className='room-card';
    card.innerHTML='<div class="room-corner tl"></div><div class="room-corner br"></div>'
      +(!r.fixed?'<button class="room-edit" onclick="openEdit(event,'+i+')">수정</button>':'')
      +'<div class="room-num">제'+['一','二','三','四','五','六'][i]+' 전시실</div>'
      +'<div class="room-name" id="rname-'+i+'">'+r.name+'</div>';
    card.addEventListener('click',e=>{if(e.target.classList.contains('room-edit'))return;selectRoom(i);});
    g.appendChild(card);
  });
}
function showScreen(id){
  ['s-entrance','s-rooms','s-class'].forEach(sid=>{
    const el=document.getElementById(sid);
    if(sid===id){el.classList.remove('gone');setTimeout(()=>el.classList.remove('hidden'),20);}
    else{el.classList.add('hidden');setTimeout(()=>el.classList.add('gone'),900);}
  });
}
function goBack(){showScreen('s-entrance');}
function showRooms(){buildRoomsGrid();showScreen('s-rooms');}
function selectRoom(i){currentRoom=i;document.getElementById('selected-room-name').textContent='[ '+roomData[i].name+' ]';showScreen('s-class');}
function openEdit(e,i){e.stopPropagation();editIdx=i;document.getElementById('edit-input').value=roomData[i].name;document.getElementById('edit-modal').classList.add('open');setTimeout(()=>document.getElementById('edit-input').focus(),100);}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){if(editIdx===null)return;const v=document.getElementById('edit-input').value.trim();if(v){roomData[editIdx].name=v;document.getElementById('rname-'+editIdx).textContent=v;}closeEdit();}
document.getElementById('edit-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveEdit();});
function enterGallery(cls){
  currentClass=cls;showScreen(null);
  setTimeout(()=>{
    document.getElementById('crosshair').style.display='block';
    document.getElementById('controls').style.display='flex';
    document.getElementById('room-info').style.display='block';
    document.getElementById('interact-hint').style.display='block';
    document.getElementById('exit-btn').style.display='block';
    startGallery(currentRoom,cls);
  },500);
}
function exitGallery(){
  if(galleryAnimId){cancelAnimationFrame(galleryAnimId);galleryAnimId=null;}
  if(galleryRenderer){galleryRenderer.dispose();galleryRenderer=null;}
  ['crosshair','controls','room-info','interact-hint','exit-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  closeM();showScreen('s-class');
}
function closeM(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeM();});
document.getElementById('mclose').onclick=closeM;
function openM(art){
  const img=document.getElementById('mart-img'),fb=document.getElementById('mart-fallback');
  if(art.img){img.src=art.img;img.style.display='block';fb.style.display='none';img.onerror=()=>{img.style.display='none';fb.style.display='block';drawFb(art);};}
  else{img.style.display='none';fb.style.display='block';drawFb(art);}
  document.getElementById('mtitle').textContent=art.title;
  document.getElementById('mmeta').textContent=art.student+' · '+art.room+' · 2026학년도';
  document.getElementById('mdesc').textContent=art.desc;
  document.getElementById('modal').classList.add('open');
}
function drawFb(art){
  const c=document.getElementById('mart-fallback'),ctx=c.getContext('2d');
  const[r,g,b]=art.color,th=v=>Math.round(v*255).toString(16).padStart(2,'0');
  ctx.fillStyle='#'+th(r)+th(g)+th(b);ctx.fillRect(0,0,440,330);
  const grd=ctx.createRadialGradient(110,82,0,110,82,220);
  grd.addColorStop(0,'rgba(255,245,210,0.2)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,440,330);
  ctx.strokeStyle='rgba(200,160,96,0.3)';ctx.lineWidth=1;ctx.strokeRect(20,15,400,300);
  ctx.fillStyle='rgba(200,160,96,0.3)';ctx.font='13px Georgia';ctx.textAlign='center';
  ctx.fillText('이미지를 추가해주세요 (STUDENT_IMAGES["'+art.student.replace('반 ','_').replace('번','')+'"])',220,175);
}
function startGallery(ri,cls){
  const artworks=getArtworks(ri,cls);
  if(galleryRenderer)galleryRenderer.dispose();
  const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.toneMapping=THREE.ReinhardToneMapping;renderer.toneMappingExposure=1.15;
  galleryRenderer=renderer;
  const scene=new THREE.Scene();scene.background=new THREE.Color(0x08060a);scene.fog=new THREE.FogExp2(0x08060a,0.04);
  const camera=new THREE.PerspectiveCamera(68,wrap.clientWidth/wrap.clientHeight,0.1,40);
  camera.position.set(0,1.65,0);scene.add(new THREE.AmbientLight(0x2a2018,0.5));
  const positions=[
    {pos:[-5.5,1.5,-7.75],rot:0},{pos:[-1.8,1.5,-7.75],rot:0},{pos:[1.8,1.5,-7.75],rot:0},{pos:[5.5,1.5,-7.75],rot:0},
    {pos:[-5.5,1.5,7.75],rot:Math.PI},{pos:[-1.8,1.5,7.75],rot:Math.PI},{pos:[1.8,1.5,7.75],rot:Math.PI},{pos:[5.5,1.5,7.75],rot:Math.PI},
  ];
  const artMeshes=[];
  artworks.forEach((art,i)=>{
    const p=positions[i],g=new THREE.Group(),[r,gb,b]=art.color,artCol=new THREE.Color(r,gb,b);
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.5,1.15,0.05),new THREE.MeshLambertMaterial({color:0xb89050})));
